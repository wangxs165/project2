<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intraday Monitor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f5f7;
        --panel: #ffffff;
        --text: #151b23;
        --muted: #66717f;
        --line: #d8dee6;
        --head: #eef2f5;
        --accent: #176b5d;
        --accent-soft: #e7f3ef;
        --danger: #a23b3b;
        --warn: #8a5a00;
        --ok: #247247;
        --shadow: 0 1px 2px rgba(20, 29, 38, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0;
      }
      h2 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0;
      }
      main {
        display: grid;
        gap: 14px;
        padding: 18px 24px 28px;
        grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      }
      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        min-width: 0;
      }
      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      .panel-body {
        padding: 14px;
      }
      .stack {
        display: grid;
        gap: 14px;
      }
      .span-2 {
        grid-column: 1 / -1;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        border-radius: 6px;
        min-height: 34px;
        padding: 7px 11px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      button.secondary {
        background: white;
        color: var(--accent);
      }
      button.danger {
        border-color: var(--danger);
        color: var(--danger);
        background: white;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      input {
        width: 132px;
        min-height: 34px;
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-size: 13px;
        text-transform: uppercase;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th,
      td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        font-size: 13px;
        overflow-wrap: anywhere;
      }
      th {
        background: var(--head);
        color: #334150;
        font-weight: 600;
      }
      tbody tr:last-child td {
        border-bottom: 0;
      }
      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
      .status-grid {
        display: grid;
        gap: 8px;
      }
      .metric {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }
      .metric:last-child {
        border-bottom: 0;
      }
      .metric strong {
        font-weight: 600;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        background: #fbfcfd;
        font-size: 13px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 8px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
      }
      .status-ok {
        color: var(--ok);
      }
      .status-bad {
        color: var(--danger);
      }
      .status-warn {
        color: var(--warn);
      }
      .empty {
        padding: 14px;
        color: var(--muted);
        font-size: 13px;
      }
      .history-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .history-block {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .history-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        padding: 9px 10px;
        background: #fbfcfd;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        font-weight: 600;
      }
      .signal-list {
        display: grid;
        gap: 12px;
      }
      .signal-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }
      .signal-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        padding: 11px 12px;
        background: #fbfcfd;
        border-bottom: 1px solid var(--line);
      }
      .signal-meta {
        display: grid;
        gap: 4px;
      }
      .signal-body {
        padding: 12px;
        display: grid;
        gap: 12px;
      }
      .reason-list {
        margin: 0;
        padding-left: 18px;
        color: #334150;
        font-size: 13px;
      }
      .reason-list li {
        margin: 4px 0;
      }
      .score-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      }
      .score-item {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        background: #fbfcfd;
      }
      .score-item span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }
      .score-item strong {
        font-size: 14px;
      }
      @media (max-width: 820px) {
        header,
        main {
          padding-left: 14px;
          padding-right: 14px;
        }
        header {
          display: grid;
        }
        main {
          grid-template-columns: 1fr;
        }
        .toolbar {
          justify-content: flex-start;
        }
        th,
        td {
          padding: 8px 7px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Intraday Investment Monitor</h1>
        <div class="muted">Monitoring suggestion only. This app does not place trades.</div>
      </div>
      <div class="toolbar">
        <button id="refresh-prices">Refresh Prices</button>
        <button id="run-analysis" class="secondary">Run Analysis</button>
        <button id="start" class="secondary">Start Monitor</button>
        <button id="stop" class="secondary">Stop</button>
      </div>
    </header>
    <main>
      <div class="stack">
        <section>
          <div class="panel-head">
            <h2>Status</h2>
            <span id="monitoring-badge" class="badge">Loading</span>
          </div>
          <div id="status" class="panel-body status-grid"></div>
        </section>

        <section>
          <div class="panel-head">
            <h2>Watchlist</h2>
          </div>
          <div class="panel-body">
            <div id="symbols" class="row"></div>
            <div class="row" style="margin-top: 12px">
              <input id="symbol-input" maxlength="10" placeholder="SYMBOL" />
              <button id="add-symbol" class="secondary">Add</button>
            </div>
          </div>
        </section>
      </div>

      <section>
        <div class="panel-head">
          <h2>Latest Prices</h2>
          <span id="price-updated" class="muted">No refresh yet</span>
        </div>
        <div id="prices" class="panel-body"></div>
      </section>

      <section class="span-2">
        <div class="panel-head">
          <h2>Past 5 Trading Days</h2>
          <span class="muted">Daily open and close from the active provider</span>
        </div>
        <div id="history" class="panel-body"></div>
      </section>

      <section>
        <div class="panel-head">
          <h2>Signals</h2>
          <span id="analysis-summary" class="muted">No analysis run yet</span>
        </div>
        <div id="signals" class="panel-body"></div>
      </section>

      <section>
        <div class="panel-head">
          <h2>Notifications</h2>
        </div>
        <div id="notifications" class="panel-body"></div>
      </section>
    </main>
    <script>
      async function json(path, options) {
        const response = await fetch(path, options);
        if (!response.ok) {
          throw new Error(await response.text());
        }
        return response.json();
      }

      function money(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) return "n/a";
        return Number(value).toLocaleString(undefined, {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function number(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) return "n/a";
        return Number(value).toLocaleString();
      }

      function shortDate(value) {
        if (!value) return "n/a";
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
          const [year, month, day] = value.split("-").map(Number);
          return new Date(year, month - 1, day).toLocaleDateString(undefined, {
            month: "short",
            day: "numeric",
          });
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      }

      function shortTime(value) {
        if (!value) return "n/a";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function priceRows(prices) {
        const rows = Object.values(prices || {});
        if (!rows.length) {
          return `<div class="empty">No price data yet. Use Refresh Prices.</div>`;
        }
        return `
          <table>
            <thead>
              <tr>
                <th style="width: 16%">Symbol</th>
                <th class="num" style="width: 18%">Latest</th>
                <th class="num" style="width: 16%">Volume</th>
                <th style="width: 18%">Freshness</th>
                <th>Source Time</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map((row) => {
                  const freshness = freshnessBadge(row.source_ts);
                  return `
                    <tr>
                      <td><strong>${row.symbol}</strong></td>
                      <td class="num">${money(row.price)}</td>
                      <td class="num">${number(row.volume)}</td>
                      <td><span class="badge ${freshness.className}">${freshness.label}</span></td>
                      <td>${shortTime(row.source_ts)}</td>
                    </tr>
                  `;
                })
                .join("")}
            </tbody>
          </table>
        `;
      }

      function freshnessBadge(sourceTime) {
        if (!sourceTime) return { label: "unknown", className: "status-warn" };
        const ageHours = (Date.now() - new Date(sourceTime).getTime()) / 36e5;
        if (ageHours <= 0.25) return { label: "fresh", className: "status-ok" };
        if (ageHours <= 72) return { label: "market closed", className: "status-warn" };
        return { label: "stale", className: "status-bad" };
      }

      function historyView(history) {
        const symbols = Object.keys(history || {});
        if (!symbols.length) {
          return `<div class="empty">No daily history loaded.</div>`;
        }
        return `
          <div class="history-grid">
            ${symbols
              .map((symbol) => {
                const rows = history[symbol] || [];
                return `
                  <div class="history-block">
                    <div class="history-title">
                      <span>${symbol}</span>
                      <span class="muted">${rows.length} days</span>
                    </div>
                    ${
                      rows.length
                        ? `<table>
                            <thead>
                              <tr>
                                <th>Date</th>
                                <th class="num">Open</th>
                                <th class="num">Close</th>
                                <th class="num">Change</th>
                              </tr>
                            </thead>
                            <tbody>
                              ${rows
                                .map((row) => {
                                  const change = row.close - row.open;
                                  const cls = change >= 0 ? "status-ok" : "status-bad";
                                  return `
                                    <tr>
                                      <td>${shortDate(row.date)}</td>
                                      <td class="num">${money(row.open)}</td>
                                      <td class="num">${money(row.close)}</td>
                                      <td class="num ${cls}">${change >= 0 ? "+" : ""}${money(change)}</td>
                                    </tr>
                                  `;
                                })
                                .join("")}
                            </tbody>
                          </table>`
                        : `<div class="empty">No history available.</div>`
                    }
                  </div>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function compactList(items, emptyText, renderer) {
        if (!items || !items.length) return `<div class="empty">${emptyText}</div>`;
        return `
          <table>
            <tbody>
              ${items.map(renderer).join("")}
            </tbody>
          </table>
        `;
      }

      function scoreLabel(key) {
        return key
          .split("_")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function signalCards(signals) {
        if (!signals || !signals.length) {
          return `<div class="empty">No analysis results yet. Run Analysis during market hours to generate signals.</div>`;
        }
        return `
          <div class="signal-list">
            ${signals
              .map((signal) => {
                const scoreBreakdown = signal.score_breakdown || {};
                const alertClass = signal.should_alert ? "status-ok" : "status-warn";
                return `
                  <div class="signal-card">
                    <div class="signal-head">
                      <div class="signal-meta">
                        <strong>${signal.symbol}</strong>
                        <span class="muted">${signal.band}</span>
                      </div>
                      <span class="badge ${alertClass}">${signal.confidence} / 100</span>
                    </div>
                    <div class="signal-body">
                      <div class="score-grid">
                        <div class="score-item">
                          <span>Current price</span>
                          <strong>${money(signal.current_price)}</strong>
                        </div>
                        <div class="score-item">
                          <span>Suggested price</span>
                          <strong>${money(signal.suggested_buy_price)}</strong>
                        </div>
                        <div class="score-item">
                          <span>Alert status</span>
                          <strong>${signal.should_alert ? "Qualified" : "No alert"}</strong>
                        </div>
                        <div class="score-item">
                          <span>Created</span>
                          <strong>${shortTime(signal.created_at)}</strong>
                        </div>
                      </div>
                      <ul class="reason-list">
                        ${(signal.reasons || []).map((reason) => `<li>${reason}</li>`).join("")}
                      </ul>
                      <div class="score-grid">
                        ${Object.keys(scoreBreakdown)
                          .map(
                            (key) => `
                              <div class="score-item">
                                <span>${scoreLabel(key)}</span>
                                <strong>${Number(scoreBreakdown[key]).toFixed(1)}</strong>
                              </div>
                            `
                          )
                          .join("")}
                      </div>
                    </div>
                  </div>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function analysisText(status) {
        const result = status.runner.last_cycle_result;
        if (!result) return "No analysis run yet";
        if (!result.market_open) return "Skipped: market closed";
        if (result.errors && result.errors.length) return `${result.errors.length} errors`;
        return `${result.generated_signals} signals, ${result.sent_notifications} alerts sent`;
      }

      async function refresh() {
        const [status, symbols, prices, history, signals, notifications] = await Promise.all([
          json("/status"),
          json("/symbols"),
          json("/prices"),
          json("/history/open-close"),
          json("/signals"),
          json("/notifications"),
        ]);

        const badge = document.getElementById("monitoring-badge");
        badge.textContent = status.monitoring ? "Running" : "Stopped";
        badge.className = `badge ${status.monitoring ? "status-ok" : "status-bad"}`;

        document.getElementById("status").innerHTML = `
          <div class="metric"><span>Data provider</span><strong>${status.data_provider}</strong></div>
          <div class="metric"><span>Provider status</span><strong>${status.data_provider_status}</strong></div>
          <div class="metric"><span>Tracked symbols</span><strong>${status.tracked_symbols.length}</strong></div>
          <div class="metric"><span>Latest prices</span><strong>${status.latest_price_count}</strong></div>
          <div class="metric"><span>Cycles completed</span><strong>${status.runner.cycles_completed}</strong></div>
          <div class="metric"><span>Last cycle</span><strong>${shortTime(status.runner.last_cycle_at)}</strong></div>
          <div class="metric"><span>Market open check</span><strong>${
            status.runner.last_cycle_result ? status.runner.last_cycle_result.market_open : "n/a"
          }</strong></div>
        `;
        document.getElementById("analysis-summary").textContent = analysisText(status);

        document.getElementById("symbols").innerHTML = symbols.symbols
          .map(
            (symbol) => `<span class="pill">${symbol}
              <button class="danger" data-remove="${symbol}">Remove</button>
            </span>`
          )
          .join("");

        document.getElementById("prices").innerHTML = priceRows(prices.prices);
        const latestReceived = Object.values(prices.prices || {})
          .map((row) => row.received_ts)
          .sort()
          .pop();
        document.getElementById("price-updated").textContent = latestReceived
          ? `Updated ${shortTime(latestReceived)}`
          : "No refresh yet";

        document.getElementById("history").innerHTML = historyView(history.history);

        document.getElementById("signals").innerHTML = signalCards(signals.signals.slice(0, 5));

        document.getElementById("notifications").innerHTML = compactList(
          notifications.notifications.slice(0, 5),
          "No notifications yet.",
          (notification) => `
            <tr>
              <td><strong>${notification.symbol}</strong></td>
              <td>${notification.status}</td>
              <td class="num">${notification.confidence ?? "n/a"}</td>
              <td>${shortTime(notification.created_at)}</td>
            </tr>
          `
        );
      }

      async function runWithDisabled(button, action) {
        button.disabled = true;
        try {
          await action();
        } finally {
          button.disabled = false;
        }
      }

      document.getElementById("start").addEventListener("click", async (event) => {
        await runWithDisabled(event.currentTarget, async () => {
          await json("/monitoring/start", { method: "POST" });
          await refresh();
        });
      });
      document.getElementById("stop").addEventListener("click", async (event) => {
        await runWithDisabled(event.currentTarget, async () => {
          await json("/monitoring/stop", { method: "POST" });
          await refresh();
        });
      });
      document.getElementById("refresh-prices").addEventListener("click", async (event) => {
        await runWithDisabled(event.currentTarget, async () => {
          await json("/prices/refresh", { method: "POST" });
          await refresh();
        });
      });
      document.getElementById("run-analysis").addEventListener("click", async (event) => {
        await runWithDisabled(event.currentTarget, async () => {
          await json("/monitoring/run-once", { method: "POST" });
          await refresh();
        });
      });
      document.getElementById("add-symbol").addEventListener("click", async () => {
        const input = document.getElementById("symbol-input");
        await json("/symbols", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol: input.value }),
        });
        input.value = "";
        await refresh();
      });
      document.getElementById("symbols").addEventListener("click", async (event) => {
        const symbol = event.target.dataset.remove;
        if (!symbol) return;
        await json(`/symbols/${symbol}`, { method: "DELETE" });
        await refresh();
      });

      refresh();
      setInterval(refresh, 10000);
    </script>
  </body>
</html>
